name: Auto Build & Release

# Fully automatic: every day it pulls the latest MeteorDevelopment/meteor-client
# code into this repo, builds it, and publishes a GitHub Release whose name
# contains the Minecraft version. You never have to sync by hand.
#
#   - Runs on a daily schedule
#   - "Run workflow" button for an on-demand build (workflow_dispatch)
#   - Also runs if you push to this repo yourself

on:
  schedule:
    - cron: '0 6 * * *'     # 06:00 UTC daily
  workflow_dispatch:
  push:
    branches: [ master ]

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write            # needed to push the mirror and create releases

env:
  UPSTREAM: https://github.com/MeteorDevelopment/meteor-client.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest code from upstream (MeteorDevelopment)
        id: sync
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save this workflow so it survives the mirror reset.
          cp .github/workflows/auto-release.yml "$RUNNER_TEMP/auto-release.yml"

          git remote add upstream "$UPSTREAM"
          # Follow whatever branch upstream calls default (master, 26.x, ...).
          DEFAULT=$(git ls-remote --symref upstream HEAD | sed -n 's#^ref: refs/heads/\(.*\)\tHEAD#\1#p')
          echo "Upstream default branch: $DEFAULT"
          git fetch upstream "$DEFAULT"

          # Make this repo an exact mirror of upstream...
          git reset --hard "upstream/$DEFAULT"
          # ...but drop upstream's CI workflows (they need secrets we don't have)
          # and restore only ours, so nothing else runs in this repo.
          rm -f .github/workflows/*.yml
          mkdir -p .github/workflows
          cp "$RUNNER_TEMP/auto-release.yml" .github/workflows/auto-release.yml

          SHORT=$(git rev-parse --short upstream/$DEFAULT)
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"

          git add -A
          git commit -m "Mirror upstream @ $SHORT (auto)" || echo "Nothing to commit"
          git push --force origin HEAD:master

      - name: Read Minecraft version
        id: mc
        run: |
          set -euo pipefail
          MC=$(grep -E '^minecraft = "' gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Minecraft version: $MC"
          echo "version=$MC" >> "$GITHUB_OUTPUT"

      - name: Skip if this exact build was already released
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="mc${{ steps.mc.outputs.version }}-${{ steps.sync.outputs.short_sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing new to build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        if: steps.guard.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        if: steps.guard.outputs.skip == 'false'
        run: |
          chmod +x ./gradlew
          ./gradlew build -Pbuild_number=${{ github.run_number }} -Pcommit=${{ steps.sync.outputs.short_sha }}

      - name: Collect jars (exclude sources/javadoc)
        if: steps.guard.outputs.skip == 'false'
        id: jars
        run: |
          set -euo pipefail
          mkdir -p out
          find build/libs -maxdepth 1 -name '*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' -exec cp {} out/ \;
          echo "Jars to release:"; ls -la out

      - name: Create release
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MC="${{ steps.mc.outputs.version }}"
          SHORT="${{ steps.sync.outputs.short_sha }}"
          TAG="${{ steps.guard.outputs.tag }}"
          gh release create "$TAG" out/*.jar \
            --repo "$GITHUB_REPOSITORY" \
            --title "Meteor Client $MC (build ${{ github.run_number }})" \
            --notes "Automated build of Minecraft **$MC**.

          Built from MeteorDevelopment/meteor-client @ [\`$SHORT\`](https://github.com/MeteorDevelopment/meteor-client/commit/$SHORT).

          Drop the jar into your Fabric \`mods\` folder (Minecraft $MC, Fabric Loader)."
